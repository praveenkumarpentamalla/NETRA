name: netra_citizen
description: Project NETRA — Citizen Camera Sharing App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # HTTP client
  dio: ^5.4.3
  dio_smart_retry: ^6.0.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # WebRTC (live pull)
  flutter_webrtc: ^0.10.5

  # Camera
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pinput: ^5.0.0

  # Auth
  local_auth: ^2.2.0
  firebase_messaging: ^14.8.5

  # Utils
  intl: ^0.19.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  crypto: ^3.0.3
  uuid: ^4.3.3
  path_provider: ^2.1.3
  video_player: ^2.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.10
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: NexaText
      fonts:
        - asset: assets/fonts/NexaText-Regular.ttf
        - asset: assets/fonts/NexaText-Bold.ttf
          weight: 700
